<!DOCTYPE html>
<html>
<head>
<title>Homes For Sale | Helen Santana Homes</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#111;color:white;padding:30px;text-align:center}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:40px;
}
.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}
.card img{
width:100%;
height:220px;
object-fit:cover;
}
.card-content{
padding:20px;
}
.price{
font-size:24px;
font-weight:bold;
color:#c9a227;
}
</style>
</head>

<body>

<header>
<h1>Homes For Sale</h1>
</header>

<div class="grid">

<div class="card">
<img src="images/home1.jpg">
<div class="card-content">
<h3>Luxury Estate</h3>
<p>Miami, Florida</p>
<p>5 Beds • 4 Baths</p>
<p class="price">$1,250,000</p>
</div>
</div>

<div class="card">
<img src="images/home2.jpg">
<div class="card-content">
<h3>Modern Family Home</h3>
<p>Houston, Texas</p>
<p>4 Beds • 3 Baths</p>
<p class="price">$725,000</p>
</div>
</div>

<div class="card">
<img src="images/home3.jpg">
<div class="card-content">
<h3>Luxury Villa</h3>
<p>Los Angeles, California</p>
<p>6 Beds • 5 Baths</p>
<p class="price">$2,900,000</p>
</div>
</div>

</div>

</body>
</html>
