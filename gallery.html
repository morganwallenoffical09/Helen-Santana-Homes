<style>

margin:0;
font-family:Arial,sans-serif;

.hero{
height:50vh;
background:url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1600') center/cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,.55);
padding:20px 40px;
}

.gallery{
max-width:1500px;
margin:auto;
padding:50px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:280px;
object-fit:cover;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.info{
text-align:center;
padding:40px;
background:white;
margin:40px auto;
max-width:900px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}
